every_n_frames: 1
min_track_hits: 2

classical:
  min_area: 4
  max_area: 400
  motion_threshold: 18
  color_threshold: 120
  max_aspect_ratio: 4.0
  background_alpha: 0.35
  morph_kernel_size: 3
  dilate_iterations: 0

tracker:
  max_match_distance: 80.0
  min_iou_for_match: 0.01
  max_missed_frames: 4
  static_center_threshold: 4.0
  static_iou_threshold: 0.92
  static_frame_window: 8
  use_cone_filter: false
  cone_base_radius: 20.0
  cone_velocity_gain: 2.5
  cone_missed_growth: 8.0
